name: Publish to PyPI

on:
  release:
    types: [created]
  workflow_dispatch: {}   # allow manual runs (e.g. to re-publish an existing tag)

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # REQUIRED for PyPI Trusted Publishing (OIDC) -- no token/secret

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
